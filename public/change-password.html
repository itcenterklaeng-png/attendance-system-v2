<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#1a237e" />
  <title>เปลี่ยนรหัสผ่าน — ระบบเช็คชื่อนักเรียน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
  <style>
    html, body, button, input, select, textarea, .form-control, .btn,
    h1, h2, h3, h4, h5, h6, p, span, div, a, label {
      font-family: 'Sarabun', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif !important;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-circle"><i class="fas fa-key"></i></div>
        <div class="login-title">เปลี่ยนรหัสผ่าน</div>
        <div class="login-subtitle" id="cp-welcome">ยินดีต้อนรับ</div>
      </div>

      <div id="cp-status"></div>

      <div style="background:#fff3cd;color:#856404;border:1px solid #ffeeba;padding:.7rem 1rem;border-radius:.5rem;margin-bottom:1rem;font-size:.9rem;">
        <i class="fas fa-exclamation-triangle me-1"></i>
        คุณต้องเปลี่ยนรหัสผ่านก่อนเริ่มใช้งาน
      </div>

      <form id="cp-form">
        <div class="form-group">
          <label class="form-label fw-bold" for="cp-new">รหัสผ่านใหม่ (อย่างน้อย 6 ตัว)</label>
          <div style="position:relative;">
            <input type="password" id="cp-new" class="form-control" minlength="6" required style="padding-right:42px;" />
            <button type="button" tabindex="-1" data-toggle="cp-new"
                    style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#6b7280;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label fw-bold" for="cp-confirm">ยืนยันรหัสผ่านใหม่</label>
          <div style="position:relative;">
            <input type="password" id="cp-confirm" class="form-control" minlength="6" required style="padding-right:42px;" />
            <button type="button" tabindex="-1" data-toggle="cp-confirm"
                    style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#6b7280;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="cp-btn">
          <i class="fas fa-save me-2"></i>บันทึกรหัสผ่านใหม่
        </button>

        <button type="button" class="btn btn-link btn-block mt-2" id="logout-link" style="display:block;width:100%;text-align:center;color:#6b7280;background:none;border:none;padding:.5rem;">
          ออกจากระบบ
        </button>
      </form>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase-client.js';
    import { requireAuth, signOut } from './js/auth.js';

    function showStatus(msg, type = 'info') {
      const colors = {
        success: 'background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9;',
        error:   'background:#ffebee;color:#c62828;border:1px solid #ffcdd2;',
        info:    'background:#e3f2fd;color:#0d47a1;border:1px solid #90caf9;'
      };
      const icon = { success: 'check-circle', error: 'exclamation-circle', info: 'info-circle' }[type] || 'info-circle';
      document.getElementById('cp-status').innerHTML =
        `<div style="${colors[type]} padding:.7rem 1rem;border-radius:.5rem;margin-bottom:1rem;font-size:.9rem;">
          <i class="fas fa-${icon} me-1"></i>${msg}
        </div>`;
    }

    document.getElementById('logout-link').onclick = () => signOut();

    document.querySelectorAll('[data-toggle]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.toggle;
        const inp = document.getElementById(id);
        const ic = btn.querySelector('i');
        if (inp.type === 'password') { inp.type = 'text'; ic.className = 'fas fa-eye-slash'; }
        else { inp.type = 'password'; ic.className = 'fas fa-eye'; }
      });
    });

    const profile = await requireAuth({ requireChangePassword: false });
    if (profile) {
      const name = profile.teacher_full_name || profile.full_name || profile.email;
      document.getElementById('cp-welcome').textContent = `บัญชี: ${name}`;
      if (!profile.must_change_password) window.location.href = 'attendance.html';
    }

    document.getElementById('cp-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPwd  = document.getElementById('cp-new').value;
      const confirm = document.getElementById('cp-confirm').value;
      if (newPwd !== confirm) return showStatus('รหัสไม่ตรงกัน', 'error');
      if (newPwd === '123456789') return showStatus('ห้ามใช้รหัสเริ่มต้น — ตั้งใหม่ที่ต่างจาก 123456789', 'error');

      const btn = document.getElementById('cp-btn');
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>กำลังบันทึก...';

      const { error: e1 } = await supabase.auth.updateUser({ password: newPwd });
      if (e1) { showStatus('เปลี่ยนรหัส fail: ' + e1.message, 'error'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-save me-2"></i>บันทึกรหัสผ่านใหม่'; return; }

      const { error: e2 } = await supabase.rpc('clear_must_change_password');
      if (e2) { showStatus('clear flag fail: ' + e2.message, 'error'); btn.disabled = false; return; }

      showStatus('เปลี่ยนรหัสสำเร็จ! กำลังพาคุณไป...', 'success');
      setTimeout(() => window.location.href = 'attendance.html', 800);
    });
  </script>
</body>
</html>
